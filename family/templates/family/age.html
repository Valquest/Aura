{% load static %}
<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Šeimos Kolektyvinis Gimtadienis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

    <style>
        body { 
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); 
            color: #e0e0e0; 
            min-height: 100vh; 
            margin: 0; 
            font-family: 'Segoe UI', sans-serif; 
        }

        /* MAIN NUMBER – MASSIVE on mobile */
        .hero-age { 
            font-size: 60vw;           /* scales perfectly with screen width */
            font-weight: 900; 
            background: linear-gradient(45deg, #667eea, #764ba2, #f093fb); 
            -webkit-background-clip: text; 
            background-clip: text; 
            -webkit-text-fill-color: transparent; 
            text-shadow: 0 0 60px rgba(102,126,234,0.6); 
            line-height: 1; 
            margin: 0;
            letter-spacing: -0.02em;
        }

        /* Desktop fallback – still huge but not insane */
        @media (min-width: 769px) {
            .hero-age { font-size: 14rem; }
        }

        /* Tiny elegant subtitle */
        .subtitle {
            font-size: 4.5vw;
            opacity: 0.85;
            margin-top: 0.5rem;
        }
        @media (min-width: 769px) {
            .subtitle { font-size: 1.8rem; }
        }

        /* Glass card – smaller & tighter on mobile */
        .glass-card { 
            background: rgba(255,255,255,0.08); 
            backdrop-filter: blur(12px); 
            border-radius: 24px; 
            border: 1px solid rgba(255,255,255,0.15); 
            box-shadow: 0 8px 32px rgba(0,0,0,0.4); 
            padding: 1.8rem 1.5rem;
            max-width: 90vw;
            margin: 2rem auto;
        }

        .glass-card h3 {
            font-size: 5vw;
            margin: 0 0 0.8rem 0;
            opacity: 0.9;
        }
        @media (min-width: 769px) {
            .glass-card h3 { font-size: 1.5rem; }
        }

        .glass-card .date {
            font-size: 9vw;
            font-weight: 800;
            margin: 0.5rem 0;
            letter-spacing: -0.02em;
        }
        @media (min-width: 769px) {
            .glass-card .date { font-size: 3rem; }
        }

        .countdown { 
            color: #89CFF0; 
            font-weight: 600; 
            font-size: 4.8vw;
            margin-top: 0.5rem;
        }
        @media (min-width: 769px) {
            .countdown { font-size: 1.3rem; }
        }

        .loading { opacity: 0.5; }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

<div class="container flex-grow-1 d-flex align-items-center justify-content-center text-center py-5">
    <div>
        <h1 class="hero-age mb-3 loading" id="age-display">...</h1>
        <p class="fs-3 text-white-50 mb-2">Kolektyviniai šeimos metai</p>

        <div class="glass-card p-5 mx-auto loading" style="max-width: 420px;" id="card">
        </div>

        <div class="mt-5 text-white-50 small" id="footer-text">
            &nbsp;
        </div>
    </div>
</div>

<script>
    function fireConfetti() {
        confetti({ particleCount: 130, spread: 70, origin: { y: 0.6 }, colors: ['#667eea','#764ba2','#f093fb','#f5576c','#4facfe','#50C878'] });
        confetti({ particleCount: 90, angle: 60, spread: 55, origin: { x: 0 } });
        confetti({ particleCount: 90, angle: 120, spread: 55, origin: { x: 1 } });
    }

    // Load data from API
    fetch('/family/api/birthday/')
        .then(r => r.json())
        .then(data => {
            // Update content
            document.getElementById('age-display').textContent = data.collective_years;

            const card = document.getElementById('card');
            if (data.is_today) {
                card.innerHTML = `
                    <h2 class="mb-3">ŠIANDIEN YRA<br>KOLEKTYVINIS GIMTADIENIS!</h2>
                    <p class="fs-4 text-warning">Sveikiname visą šeimą!</p>`;
                // Triple confetti on birthday!
                fireConfetti();
                setTimeout(fireConfetti, 500);
                setTimeout(fireConfetti, 1000);
            } else {
                card.innerHTML = `
                    <h3 class="mb-3">Kitas kolektyvinis<br>gimtadienis</h3>
                    <h2 class="display-5 fw-bold mb-3">${data.next_birthday}</h2>
                    <p class="countdown fs-5">
                        Liko tik ${data.days_until_next} dien${data.days_until_next === 1 ? 'a' : 'os'}!
                    </p>`;
                fireConfetti(); // regular confetti
            }

            // Remove loading state
            document.querySelectorAll('.loading').forEach(el => el.classList.remove('loading'));
        })
        .catch(err => {
            document.getElementById('card').innerHTML = '<p class="text-danger">Nepavyko užkrauti duomenų</p>';
            console.error(err);
        });
</script>

</body>
</html>
