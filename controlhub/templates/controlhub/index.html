{% extends 'controlhub/layout.html' %}

{% block title %}
Index
{% endblock %}

{% block body %}
    <div class="container py-4">
        <div class="d-flex justify-content-center">
            <h2 class="m-3 mb-5">Aura device hub</h2>
        </div>
        <div class="row g-3 justify-content custom-row mx-auto" id="console-row">
            {% for device_id, device_name in devices.items %}
                <div class="d-flex col-4 col-sm-4 col-md-2 col-lg-2 col-xl-2 justify-content-center">
                    <div class="button-item justify-content-center">
                        <a href="{% url 'device_ctrl_page' device_id=device_id %}" class="btn btn-outline-primary btn-circle rounded-circle mb-2 d-block mx-auto" aria-label="{{ button_text }}" id="{{ device_id }}">
                            {{ device_name|slice:":1"|upper }}
                        </a>
                        <div class="button-label"> {{ device_name|truncatechars:12 }}</div>
                    </div>
                </div>
            {% empty %}
                <div class="col-12 text-center text-muted">No IoT devices available.</div>
            {% endfor %}
        </div>
    </div>
{% endblock %}
