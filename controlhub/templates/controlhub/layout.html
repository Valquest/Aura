{% load static %}

<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Aura - Controlhub</title>
        <link 
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet" 
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous">
        <link href=" {% static 'controlhub/style/styles.css' %}" rel="stylesheet">
    </head>
    <body>
        <script 
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" 
            crossorigin="anonymous">
        </script>
        <script 
            src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" 
            integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" 
            crossorigin="anonymous">
        </script>
        <script 
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" 
            integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" 
            crossorigin="anonymous">
        </script>
        {% if not user.is_authenticated %}
        <!--
            <div class="d-flex justify-content-center align-items-center vh-100 bg-dark">
                <div class="container text-center">
                    <div class="row">
                        <a><div class="column">Log In</div></a>
                        <a><div class="column">Register</div></a>
                    </div>
                </div>
            </div>
        -->
            <div class="d-flex justify-content-center align-items-center vh-100 bg-dark">
                <form data-np-autofill-form-type="login" data-np-checked="1" data-np-watching="1"> 
                    <div class="d-flex justify-content-center align-items-center flex-column">
                        <div class="row align-items-center justify-content-center">
                            <img class="mb-4" src="{% static 'controlhub/images/logo/Aura-logo-transparent-white.png' %}" alt="" height="57">
                        </div>
                        <div class="row align-items-center justify-content-center">
                            <h1 class="h3 mb-3 fw-normal">Please sign in</h1> 
                        </div>
                    </div>
                    <div class="form-floating"> 
                        <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com" data-np-autofill-field-type="username" data-np-uid="c69fa74e-853b-4316-ab26-b65eada39796"> 
                        <label for="floatingInput">Email address</label>
                    </div>
                    <div class="form-floating mb-3"> 
                        <input type="password" class="form-control" id="floatingPassword" placeholder="Password" data-np-autofill-field-type="password" data-np-uid="859f345e-cee3-4e4e-8595-85edb3efce59"> 
                        <label for="floatingPassword">Password</label> 
                    </div>
                    <button class="btn btn-primary w-100 py-2" type="submit">Sign in</button>
                </form>
            </div>
        {% else %}
            <div class="body">
                {% block body %}
                {% endblock %}
            </div>
        {% endif %}
    </body>
</html>
