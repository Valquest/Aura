{% extends 'controlhub/layout.html' %}
{% load static %}

{% block title %}
Login
{% endblock %}

{% block login_body %}
<div class="d-flex justify-content-center align-items-center vh-100 bg-dark">
    <div class="d-flex flex-column align-items-center gap-1">
        <form action="{% url 'login' %}" method="post" data-np-autofill-form-type="login">
            {% csrf_token %}
            <div class="d-flex justify-content-center align-items-center flex-column">
                <div class="row align-items-center justify-content-center">
                    <img class="mb-4" src='{% static "controlhub/images/logo/Aura-logo-transparent-white.png" %}' alt="" height="57">
                </div>
                <div class="row align-items-center justify-content-center">
                    <h1 class="h3 mb-3 fw-normal text-white">Please sign in</h1> 
                </div>
            </div>
            <div class="form-floating"> 
                <input type="username" class="form-control" id="floatingInput" placeholder="name@example.com" name="username_email"> 
                <label for="floatingInput">Email or username</label>
            </div>
            <div class="form-floating mb-3"> 
                <input type="password" class="form-control" id="floatingPassword" placeholder="Password" name="password"> 
                <label for="floatingPassword">Password</label> 
            </div>
            {% if error %}
                <div id="login_error">{{ error }}</div>
            {% endif %}
            <button class="btn btn-primary w-100 py-2" type="submit">Sign in</button>
        </form>
        <div class="form-wrapper w-100" style="max-width: 400px;">
            <a href="{% url 'register' %}" class="btn btn-primary w-100 py-2">Register</a>
        </div>
    </div>
</div>
{% endblock %}
