{% extends 'controlhub/layout.html' %}
{% load static %}

{% block title %}
Login
{% endblock %}

{% block login_body %}
<div class="d-flex justify-content-center align-items-center vh-100 bg-dark container">
    <div class="row">
        <div class="col-12" style="max-width: 400px; width: 100%;">
            <div class="text-center" id="form-container">
                <!-- header -->
                <img class="mb-4" src='{% static "controlhub/images/logo/Aura-logo-transparent-white.png" %}' alt="" height="57">
                <h1 class="h3 mb-3 fw-normal text-white">Please sign in</h1>
                
                <!-- form -->
                <form action="{% url 'login' %}" method="post" data-np-autofill-form-type="login">
                    {% csrf_token %}
                    <div class="form-floating"> 
                        <input type="text" class="form-control" id="floatingInput" placeholder="name@example.com" name="username_email">
                        <label for="floatingInput">Email or username</label>
                    </div>
                    <div class="form-floating mb-2"> 
                        <input type="password" class="form-control" id="floatingPassword" placeholder="Password" name="password"> 
                        <label for="floatingPassword">Password</label> 
                    </div>
                    {% if error %}
                        <div class="alert alert-danger mb-3" role="alert">{{ error }}</div>
                    {% endif %}
                    <button class="btn btn-primary w-100 py-2 mb-1" type="submit">Sign in</button>
                </form>

                <!-- registration form link -->
                <a href="{% url 'register' %}" class="btn btn-primary w-100 py-2">Register</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
