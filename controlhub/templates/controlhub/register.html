{% extends 'controlhub/layout.html' %}
{% load static %}

{% block title %}
Register
{% endblock %}

{% block login_body %}
<div class="d-flex justify-content-center align-items-center vh-100 bg-dark">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-4 col-md-6 col-12">
                <div class="d-flex flex-column align-items-center gap-1 text-center">
                    <img class="mb-4" src='{% static "controlhub/images/logo/Aura-logo-transparent-white.png" %}' alt="" height="57">
                    <h1 class="h3 mb-3 fw-normal text-white">Register new user</h1>
                    
                    <div class="form-wrapper w-100" style="max-width: 400px;">
                        <form action="{% url 'register' %}" method="post" data-np-autofill-form-type="login">
                            {% csrf_token %}
                            <div class="form-floating"> 
                                <input type="username" class="form-control" id="floatingInput" placeholder="username" name="username"> 
                                <label for="floatingInput">Username</label>
                            </div>
                            <div class="form-floating"> 
                                <input type="email" class="form-control mid-fields" id="floatingInputEmail" placeholder="name@example.com" name="email"> 
                                <label for="floatingInput">Email</label>
                            </div>
                            <div class="form-floating"> 
                                <input type="password" class="form-control mid-fields" id="floatingPasswordRegistration" placeholder="Password" name="password"> 
                                <label for="floatingPassword">Password</label> 
                            </div>
                            <div class="form-floating mb-2"> 
                                <input type="password" class="form-control" id="floatingPassword" placeholder="Re-enter password" name="password_two"> 
                                <label for="floatingPassword">Re-enter password</label> 
                            </div>
                            {% if error %}
                                <div class="alert alert-danger mb-3" role="alert">{{ error }}</div>
                            {% endif %}
                            <button class="btn btn-primary w-100 py-2" type="submit">Create</button>
                        </form>
                    </div>

                    <div class="form-wrapper w-100" style="max-width: 400px;">
                        <a href="{% url 'login' %}" class="btn btn-primary w-100 py-2">I have an account (login)</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
