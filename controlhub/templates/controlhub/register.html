{% extends 'controlhub/layout.html' %}

<div action="{% url 'register' %}" method="post" class="d-flex justify-content-center align-items-center vh-100 bg-dark">
    <div class="d-flex flex-column align-items-center gap-1">
        <form data-np-autofill-form-type="login">
            {% csrf_token %}
            <div class="d-flex justify-content-center align-items-center flex-column">
                <div class="row align-items-center justify-content-center">
                    <img class="mb-4" src='{% static "controlhub/images/logo/Aura-logo-transparent-white.png" %}' alt="" height="57">
                </div>
                <div class="row align-items-center justify-content-center">
                    <h1 class="h3 mb-3 fw-normal text-white">Register form<h1> 
                </div>
            </div>
            <div class="form-floating"> 
                <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com"> 
                <label for="floatingInput">Email address</label>
            </div>
            <div class="form-floating mb-3"> 
                <input type="password" class="form-control" id="floatingPassword" placeholder="Password"> 
                <label for="floatingPassword">Password</label> 
            </div>
            <div class="form-floating mb-3"> 
                <input type="password_repeat" class="form-control" id="floatingPasswordTwo" placeholder="Repeat Password"> 
                <label for="floatingPassword">Repeat Password</label> 
            </div>
            <button class="btn btn-primary w-100 py-2" type="submit">Register</button>
        </form>
        <form action="{% url 'login' %}" method="get">
        {% csrf_token %}
            <button class="btn btn-primary w-100 py-2" type="submit">I have an account</button>
        </form>
    </div>
</div>
